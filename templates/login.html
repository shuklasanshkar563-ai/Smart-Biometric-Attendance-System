<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BioAttend</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/images/favicon.ico" type="image/x-icon">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="14" fill="#4f46e5"/>
                <path d="M24 12C20.7 12 18 14.7 18 18s2.7 6 6 6 6-2.7 6-6-2.7-6-6-6zm-12 18c0-4 8-6 12-6s12 2 12 6v3H12v-3z" fill="white"/>
            </svg>
        </div>
        <h1>Welcome Back</h1>
        <p class="login-subtitle">Sign in to BioAttend</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="role-tabs">
                <label class="role-tab">
                    <input type="radio" name="role" value="admin" checked>
                    <span>
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        Admin
                    </span>
                </label>
                <label class="role-tab">
                    <input type="radio" name="role" value="teacher">
                    <span>
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                        Teacher
                    </span>
                </label>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                    placeholder="Enter your username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-with-toggle">
                    <input type="password" id="password" name="password" required
                        placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="pwd-toggle" onclick="togglePassword()">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="login-help">
            <p>Admin: <code>admin / admin123</code></p>
            <p>Teacher: <code>teacher / teacher123</code></p>
        </div>

        <a href="{{ url_for('index') }}" class="back-link">← Back to Home</a>
    </div>
</div>
<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
}
// Role tab visual
document.querySelectorAll('.role-tab input').forEach(input => {
    input.addEventListener('change', () => {
        document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
        input.closest('.role-tab').classList.add('active');
    });
});
document.querySelector('.role-tab input:checked').closest('.role-tab').classList.add('active');
</script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
