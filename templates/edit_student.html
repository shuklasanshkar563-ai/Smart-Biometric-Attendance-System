{% extends "base.html" %}
{% block title %}Edit Student{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;margin:0 auto">
    <div class="card-header">
        <h2 class="card-title">Edit: {{ student.name }}</h2>
    </div>
    <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required value="{{ student.name }}">
            </div>
            <div class="form-group">
                <label for="roll_number">Roll Number *</label>
                <input type="text" id="roll_number" name="roll_number" required value="{{ student.roll_number }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="class">Class *</label>
                <input type="text" id="class" name="class" required value="{{ student.class }}">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ student.email or '' }}">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="parent_name">Parent Name</label>
                <input type="text" id="parent_name" name="parent_name" value="{{ student.parent_name or '' }}">
            </div>
            <div class="form-group">
                <label for="parent_phone">Parent Phone</label>
                <input type="tel" id="parent_phone" name="parent_phone" value="{{ student.parent_phone or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('student_profile', student_id=student.id) }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
